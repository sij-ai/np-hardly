constraints:
  - type: "aggregate_hours"
    enforcement: "MUST"
    subject: {volunteer_ids: ["ANY"]}
    condition: {min_hours: 12, max_hours: 24}

  - type: "rolling_window"
    enforcement: "MUST_NOT"
    subject: {volunteer_ids: ["ANY"]}
    condition: {max_hours_worked: 8, window_size_hours: 16}

  - type: "minimum_rest"
    enforcement: "MUST"
    subject: {volunteer_ids: ["ANY"]}
    condition: {min_rest_hours: 12}

  - type: "shift_composition"
    enforcement: "MUST"
    subject: {volunteer_ids: ["ANY"]}
    condition:
      target_shift_id: "ANY"
      filter_attribute: "role_experience.camp_rover"
      filter_operator: "GREATER_THAN_OR_EQUAL"
      filter_value: 4
      min_count: 1
      max_count: 99

  - type: "shift_composition"
    enforcement: "PREFER_NOT"
    weight: 10
    subject: {volunteer_ids: ["ANY"]}
    condition:
      target_shift_id: "ANY"
      filter_attribute: "role_experience.camp_rover"
      filter_operator: "LESS_THAN"
      filter_value: 1
      min_count: 4   
      max_count: 99

  - type: "attribute"
    enforcement: "MUST_NOT"
    subject:
      filter_attribute: "role_experience.id_keeper"
      filter_operator: "LESS_THAN"
      filter_value: 1
    condition: {target_role_id: "id_keeper", target_shift_id: "ANY"}

  - type: "attribute"
    enforcement: "MUST_NOT"
    subject:
      filter_attribute: "role_experience.camp_taxi"
      filter_operator: "LESS_THAN"
      filter_value: 2
    condition: {target_role_id: "camp_taxi", target_shift_id: "ANY"}

  - type: "attribute"
    enforcement: "PREFER"
    weight: 15
    subject:
      filter_attribute: "role_experience.eagle_eye"
      filter_operator: "GREATER_THAN_OR_EQUAL"
      filter_value: 4
    condition: {target_role_id: "eagle_eye", target_shift_id: "ANY"}

  - type: "pairing"
    enforcement: "MUST_NOT"
    subject: {volunteer_ids: ["vol_01", "vol_02"]}
    condition: {match_target: "shift"}

  - type: "pairing"
    enforcement: "MUST"
    subject: {volunteer_ids: ["vol_34", "vol_35"]}
    condition: {match_target: "shift"}

  - type: "pairing"
    enforcement: "PREFER"
    weight: 20
    subject: {volunteer_ids: ["vol_03", "vol_04", "vol_05", "vol_06"]}
    condition: {match_target: "shift"}

  - type: "pairing"
    enforcement: "PREFER_NOT"
    weight: 15
    subject: {volunteer_ids: ["vol_28", "vol_29"]}
    condition: {match_target: "shift"}

  - type: "availability"
    enforcement: "MUST_NOT"
    subject: {volunteer_ids: ["vol_10", "vol_11"]}
    condition: {start_datetime: "2025-07-08T00:00:00", end_datetime: "2025-07-10T00:00:00"}

  - type: "availability"
    enforcement: "PREFER"
    weight: 5
    subject: {volunteer_ids: ["vol_12"]}
    condition: {start_datetime: "2025-07-10T21:00:00", end_datetime: "2025-07-11T05:00:00"} 

  - type: "availability"
    enforcement: "PREFER_NOT"
    weight: 10
    subject: {volunteer_ids: ["vol_30"]}
    condition: {start_datetime: "2025-07-10T01:00:00", end_datetime: "2025-07-10T09:00:00"} 

  - type: "assignment"
    enforcement: "MUST"
    subject: {volunteer_ids: ["vol_31"]}
    condition: {target_shift_id: "shift_sat_21", target_role_id: "id_keeper"}

  - type: "assignment"
    enforcement: "MUST_NOT"
    subject: {volunteer_ids: ["vol_18"]}
    condition: {target_shift_id: "ANY", target_role_id: "camp_rover"}

  - type: "assignment"
    enforcement: "PREFER"
    weight: 8
    subject: {volunteer_ids: ["vol_20"]}
    condition: {target_shift_id: "shift_thu_13", target_role_id: "camp_taxi"}

  - type: "aggregate_hours"
    enforcement: "PREFER"
    weight: 10
    subject: {volunteer_ids: ["vol_19", "vol_20", "vol_21", "vol_22", "vol_23", "vol_24", "vol_25", "vol_26", "vol_27"]}
    condition: {min_hours: 16, max_hours: 16}

  - type: "aggregate_hours"
    enforcement: "PREFER_NOT"
    weight: 5
    subject: {volunteer_ids: ["ANY"]}
    condition: {min_hours: 12, max_hours: 12}

  # --- 21. THE NEW SPAN CONSTRAINT ---
  - type: "shift_span"
    description: "Squeeze everyone's shifts into a 3-day footprint"
    enforcement: "PREFER_NOT"
    weight: 1
    subject: {volunteer_ids: ["ANY"]}
    condition: {max_span_hours: 72}

